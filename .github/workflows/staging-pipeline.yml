name: Staging DevSecOps Pipeline

on:
  push:
    branches:
      - staging

env:
  REGISTRY: ${{ secrets.ACR_LOGIN_SERVER }}
  IMAGE_NAME: devops-demo
  TAG: staging-${{ github.sha }}
  IMAGE: ${{ secrets.ACR_LOGIN_SERVER }}/devops-demo

jobs:

  security-scans:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4


      - name: SonarCloud Scans
        uses: SonarSource/sonarqube-scan-action@v7.1.0
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}


      - name: Trivy FS Scan
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          scan-type: fs
          severity: HIGH,CRITICAL
          exit-code: 1


  image-scan-and-push:
    runs-on: ubuntu-latest
    needs: security-scans

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3


      - name: Build Docker Image (SINGLE BUILD)
        run: |
          docker build \
            --cache-from=type=gha \
            --cache-to=type=gha,mode=max \
            -t $IMAGE:$TAG .

      - name: Trivy Image Scan
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          image-ref: ${{ env.IMAGE }}:${{ env.TAG }}
          severity: HIGH,CRITICAL
          exit-code: 1

      - name: Login to ACR
        run: |
          echo $ACR_PASSWORD | docker login $REGISTRY -u $ACR_USERNAME --password-stdin
        env:
          ACR_USERNAME: ${{ secrets.ACR_USERNAME }}
          ACR_PASSWORD: ${{ secrets.ACR_PASSWORD }}

      - name: Push Image
        run: |
          docker push $IMAGE:$TAG


  gitops-update:
    runs-on: ubuntu-latest
    needs: image-scan-and-push

    permissions:
      contents: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Update Helm values
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"

          git fetch origin gitops
          git checkout gitops

          sed -i "s/tag:.*/tag: $TAG/" helm/my-app/values.yaml

          git add helm/my-app/values.yaml
          git commit -m "update image tag $TAG"
          git push origin gitops